<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center">Add Question</h2>

        <form action="/savequestion/" method="post">
            {% csrf_token %}

            <input type="text" name="qtext" placeholder="Enter Question" class="form-control mb-2">

            <input type="text" name="op1" placeholder="Option 1" class="form-control mb-2">
            <input type="text" name="op2" placeholder="Option 2" class="form-control mb-2">
            <input type="text" name="op3" placeholder="Option 3" class="form-control mb-2">
            <input type="text" name="op4" placeholder="Option 4" class="form-control mb-2">

            <input type="text" name="correct_ans" placeholder="Correct Answer" class="form-control mb-2">

            <select name="subject" class="form-control mb-3">
                <option>Basic Python</option>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>Machine Learning</option>
            </select>

            <button class="btn btn-success w-100">Add Question</button>

        </form>

    </div>
</div>

</body>
</html>
