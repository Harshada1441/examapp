<!DOCTYPE html>
<html>
<head>
    <title>View Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3>{{q.qtext}}</h3>

<ul class="list-group mt-3">

<li class="list-group-item">{{q.op1}}</li>
<li class="list-group-item">{{q.op2}}</li>
<li class="list-group-item">{{q.op3}}</li>
<li class="list-group-item">{{q.op4}}</li>

</ul>

<h5 class="mt-3 text-success">Correct Answer: {{q.correct_ans}}</h5>

<p class="mt-2"><b>Subject:</b> {{q.subject}}</p>

<a href="/showquestions/" class="btn btn-primary mt-3">Back</a>

</div>

</div>

</body>
</html>
