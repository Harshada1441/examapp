<!DOCTYPE html>
<html>
<head>
    <title>Start Test</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

    <h3 class="text-center mb-4">MCQ Test</h3>

    <!-- ❗ Error message -->
    {% if msg %}
        <p class="text-danger text-center">{{msg}}</p>
    {% endif %}

    <!-- Question -->
    <h5>{{q.qtext}}</h5>

    <form method="post">

        {% csrf_token %}

        <!-- Options -->
        <div class="form-check">
            <input type="radio" name="answer" value="{{q.op1}}" class="form-check-input">
            <label class="form-check-label">{{q.op1}}</label>
        </div>

        <div class="form-check">
            <input type="radio" name="answer" value="{{q.op2}}" class="form-check-input">
            <label class="form-check-label">{{q.op2}}</label>
        </div>

        <div class="form-check">
            <input type="radio" name="answer" value="{{q.op3}}" class="form-check-input">
            <label class="form-check-label">{{q.op3}}</label>
        </div>

        <div class="form-check mb-3">
            <input type="radio" name="answer" value="{{q.op4}}" class="form-check-input">
            <label class="form-check-label">{{q.op4}}</label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">Next</button>

    </form>

</div>

</div>

</body>
</html>
