<!DOCTYPE html>
<html>
<head>
    <title>Update Question</title>
</head>

<body>

<h2>Update Question</h2>

<form action="/updatecurd/{{q.qid}}/" method="post">

    {% csrf_token %}

    Question : <br>
    <input type="text" name="qtext" value="{{q.qtext}}"><br><br>

    Option 1 : <br>
    <input type="text" name="op1" value="{{q.op1}}"><br><br>

    Option 2 : <br>
    <input type="text" name="op2" value="{{q.op2}}"><br><br>

    Option 3 : <br>
    <input type="text" name="op3" value="{{q.op3}}"><br><br>

    Option 4 : <br>
    <input type="text" name="op4" value="{{q.op4}}"><br><br>

    Correct Answer : <br>
    <input type="text" name="correct_ans" value="{{q.correct_ans}}"><br><br>

    Subject : <br>
    <input type="text" name="subject" value="{{q.subject}}"><br><br>

    <input type="submit" value="Update Question">

</form>

</body>
</html>
