<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

    <h2 class="text-center text-success">Your Score: {{score}}</h2>

    <hr>

    <h4 class="text-center mb-3">Review Answers</h4>

    {% for a in answers %}

    <div class="card p-3 mb-3">

        <b>Question:</b> {{a.question}} <br>
        <b>Your Answer:</b> {{a.selected}} <br>
        <b>Correct Answer:</b> {{a.correct}}

        {% if a.selected == a.correct %}
            <p class="text-success mt-2">✔ Correct</p>
        {% else %}
            <p class="text-danger mt-2">❌ Wrong</p>
        {% endif %}

    </div>

    {% endfor %}

    <div class="text-center mt-4">
        <a href="/subject/" class="btn btn-primary">Start Again</a>
        <a href="/myresults/" class="btn btn-success">View My Results</a>
    </div>

</div>

</div>

</body>
</html>
