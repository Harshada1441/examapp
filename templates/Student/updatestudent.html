<!DOCTYPE html>
<html>
<head>
<title>Update Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3>Update Student</h3>

<form action="/updatestudentcurd/{{s.id}}/" method="post">

{% csrf_token %}

<input type="text" name="username" value="{{s.username}}" class="form-control mb-2">

<input type="text" name="password" value="{{s.password}}" class="form-control mb-2">

<input type="text" name="mobno" value="{{s.mobno}}" class="form-control mb-3">

<button class="btn btn-primary w-100">Update</button>

</form>

</div>

</div>

</body>
</html>
