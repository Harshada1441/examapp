<!DOCTYPE html>
<html>
<head>
<title>All Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">All Students</h2>

<table class="table table-bordered table-striped">

<tr class="table-dark">
    <th>ID</th>
    <th>Username</th>
    <th>Mobile</th>
    <th>Action</th>
</tr>

{% for s in data %}

<tr>
    <td>{{s.id}}</td>
    <td>{{s.username}}</td>
    <td>{{s.mobno}}</td>

    <td>
        <a href="/viewstudent/{{s.id}}/" class="btn btn-info btn-sm">View</a>
        <a href="/updatestudent/{{s.id}}/" class="btn btn-warning btn-sm">Edit</a>
        <a href="/deletestudent/{{s.id}}/" class="btn btn-danger btn-sm">Delete</a>
    </td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
