<!DOCTYPE html>
<html>
<head>
    <title>All Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">All Questions</h2>

    <table class="table table-bordered table-striped shadow">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Question</th>
                <th>Options</th>
                <th>Answer</th>
                <th>Subject</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for q in data %}

        <tr>
            <td>{{q.qid}}</td>
            <td>{{q.qtext}}</td>

            <td>
                {{q.op1}} <br>
                {{q.op2}} <br>
                {{q.op3}} <br>
                {{q.op4}}
            </td>

            <td>{{q.correct_ans}}</td>
            <td>{{q.subject}}</td>

            <td>
                <a href="/update/{{q.qid}}/" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{q.qid}}/" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
